name: Build Bob AI Studio APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle Wrapper is present
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.7
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # GROQ_API_KEY must be added under
      # Repo Settings -> Secrets and variables -> Actions -> New repository secret
      - name: Build debug APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --stacktrace

      # Optional: only runs if you've also added signing secrets.
      # Safe to leave the secrets unset — the release build then falls back
      # to debug signing (see app/build.gradle.kts) so this step never fails
      # the pipeline by itself.
      - name: Build release APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SIGNING_STORE_FILE: ${{ secrets.SIGNING_STORE_FILE }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bob-ai-studio-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: bob-ai-studio-release
          path: app/build/outputs/apk/release/app-release.apk
